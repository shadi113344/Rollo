<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Footer test 2">
  <link rel="manifest" href="/test2-manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <title>Footer test 2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      background: #000000;
    }

    body {
      margin: 0;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      background: #000000;
    }

    .test2-footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: auto;
      top: calc(100lvh - 56px - env(safe-area-inset-bottom, 0px));
      z-index: 100;
      display: flex;
      gap: 12px;
      align-items: center;
      height: calc(56px + env(safe-area-inset-bottom, 0px));
      padding:
        8px max(16px, env(safe-area-inset-right))
        calc(8px + env(safe-area-inset-bottom, 0px))
        max(16px, env(safe-area-inset-left));
      background: transparent;
      border-top: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .test2-footer a {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      -webkit-tap-highlight-color: transparent;
    }

    .test2-footer a.btn-outline {
      background: #ffffff;
      color: #374151;
      border: 1px solid #d1d5db;
    }

    .test2-footer a.btn-outline:active {
      background: #f3f4f6;
    }

    .test2-footer a.btn-primary {
      background: #2563eb;
      color: #ffffff;
      border: 1px solid #2563eb;
    }

    .test2-footer a.btn-primary:active {
      background: #1d4ed8;
      border-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <video
    class="bg-video"
    src="/videos/Gym/vid.mp4"
    autoplay
    loop
    muted
    playsinline
    webkit-playsinline
    preload="auto"
  ></video>

  <footer class="test2-footer" aria-label="Test 2 navigation">
    <a href="/test-footer.html" class="btn-outline">Test 1</a>
    <a href="/test2.html" class="btn-primary" aria-current="page">Test 2</a>
  </footer>
</body>
</html>
