<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- BISECT STEP 1: standalone config WITHOUT a manifest link, so the home-screen icon
       launches THIS page (test-footer.html) in standalone mode instead of redirecting to
       the manifest's start_url ("/"). If the footer breaks now, standalone + black-translucent
       is the cause. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Footer test">
  <title>Footer test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html {
      height: 100%;
      background: #ffffff;
    }

    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #333;
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px 20px calc(72px + env(safe-area-inset-bottom, 0px));
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 8px;
    }

    p {
      margin: 0;
      font-size: 15px;
      line-height: 1.5;
      color: #666;
    }

  /* Standalone test footer — not shared with Rollo app nav */
    .test-footer {
      position: fixed;
      left: 0;
      right: 0;
      /* iOS standalone reports a too-short viewport at first paint: bottom:0 / innerHeight /
         dvh / svh / 100% all stay 793 until a physical swipe forces a recompute. ONLY `lvh`
         (large-viewport height) reaches the true 852 on its own, right after load. So anchor
         the footer from the top against lvh — its bottom edge lands at 100lvh = physical bottom. */
      bottom: auto;
      top: calc(100lvh - 56px - env(safe-area-inset-bottom, 0px));
      z-index: 100;
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      height: calc(56px + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: #ffffff;
      border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
    }

    .test-footer a {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      color: #999;
      font-size: 10px;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }

    .test-footer a.active {
      color: #2563eb;
    }

    .test-footer a:active {
      background: #f5f5f5;
    }

    .test-footer .icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .test-footer .icon svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .test-footer a.active .icon svg[fill="currentColor"] {
      fill: currentColor;
      stroke: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Footer test page</h1>
    <p>
      Blank white page with a separate bottom bar. Use the icons below to jump to Profile, Feed, or stay here.
      This footer is not connected to the main Rollo navigation.
    </p>
  </main>

  <nav class="test-footer" aria-label="Test navigation">
    <a href="/" id="nav-profile">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5 20c0-4 3.6-6 7-6s7 2 7 6"/></svg>
      </span>
      <span>Profile</span>
    </a>
    <a href="/watch.html" id="nav-feed">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/></svg>
      </span>
      <span>Feed</span>
    </a>
    <a href="/test-footer.html" id="nav-test" class="active" aria-current="page">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </span>
      <span>Test</span>
    </a>
  </nav>
</body>
</html>
